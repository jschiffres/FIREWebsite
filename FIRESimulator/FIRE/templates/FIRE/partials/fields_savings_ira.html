<div class="ira-entry">
    <!-- SAVINGS FIELDS ROW -->
    <div class="row g-4 mb-3">
        <div class="col-lg-3">
            <h5 class="input-name">Current Value</h5>   
            <div class="input-group">
                <span class="input-group-text">$</span>             
                <input type="number" class="form-control input-field" name="ira_current_value" min="1" max="10000000" value="10000" required>
            </div>
        </div>
        <div class="col-lg-3">
            <h5 class="input-name">Yearly Growth</h5>   
            <div class="input-group">           
                <input type="number" class="form-control input-field" name="ira_yearly_growth" min="0" max="99.9" value="5.0" step="0.1" required>
                <span class="input-group-text">%</span>  
            </div>
        </div>
    </div>
    <!-- SAVINGS FIELDS ROW -->
    <div class="row g-4 mb-3">
        <div class="col-lg-3">
            <h5 class="input-name">Current Contribution Limit</h5>   
            <div class="input-group">
                <span class="input-group-text">$</span>             
                <input type="number" class="form-control input-field" name="ira_contribution_limit" min="1" max="10000000" value="7000" required>
            </div>
        </div>
        <div class="col-lg-3">
            <h5 class="input-name">Yearly Contribution Limit Increase</h5>   
            <div class="input-group">
                <span class="input-group-text">$</span>             
                <input type="number" class="form-control input-field" name="ira_contribution_limit_step" min="1" max="100000" value="300" required>
            </div>
        </div>
    </div>
</div>
